<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="24" fill="#1a3a8a"/>
  <!-- Film frame with pencil -->
  <g fill="#ffe040">
    <!-- Film frame outer -->
    <rect x="45" y="45" width="110" height="110" rx="8" fill="none" stroke="#ffe040" stroke-width="10"/>
    <!-- Sprocket holes left -->
    <rect x="35" y="60" width="16" height="12" rx="3"/>
    <rect x="35" y="90" width="16" height="12" rx="3"/>
    <rect x="35" y="120" width="16" height="12" rx="3"/>
    <!-- Sprocket holes right -->
    <rect x="149" y="60" width="16" height="12" rx="3"/>
    <rect x="149" y="90" width="16" height="12" rx="3"/>
    <rect x="149" y="120" width="16" height="12" rx="3"/>
    <!-- Pencil diagonal -->
    <rect x="70" y="68" width="12" height="65" rx="3" transform="rotate(-35,76,100)"/>
    <!-- Pencil tip -->
    <polygon points="68,130 76,144 84,130" transform="rotate(-35,76,100)"/>
  </g>
</svg>