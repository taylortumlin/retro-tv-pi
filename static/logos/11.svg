<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="24" fill="#1a1a1a"/>
  <!-- Film clapperboard -->
  <g>
    <!-- Board body -->
    <rect x="40" y="85" width="120" height="80" rx="6" fill="white"/>
    <!-- Clapper top -->
    <path d="M40,90 L40,65 L160,65 L160,90 Z" fill="#c9a84c"/>
    <!-- Clapper stripes -->
    <rect x="50" y="65" width="14" height="25" fill="#1a1a1a" transform="skewX(-10)"/>
    <rect x="80" y="65" width="14" height="25" fill="#1a1a1a" transform="skewX(-10)"/>
    <rect x="110" y="65" width="14" height="25" fill="#1a1a1a" transform="skewX(-10)"/>
    <rect x="140" y="65" width="14" height="25" fill="#1a1a1a" transform="skewX(-10)"/>
    <!-- Hinge circle -->
    <circle cx="48" cy="77" r="6" fill="#1a1a1a"/>
  </g>
</svg>