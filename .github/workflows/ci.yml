name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      # Note: `npm run check` is intentionally not gated yet. There is a
      # backlog of pre-existing svelte-check errors (mostly type signatures
      # and .svelte.ts module resolution); restore this step once that's
      # cleaned up so CI surfaces type regressions automatically.
      # - name: Type check
      #   run: npm run check

      - name: Build
        run: npm run build

      - name: Upload built bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: static/dist/
          retention-days: 7

  backend:
    name: Backend (syntax + import check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install
        run: pip install -r requirements.txt

      - name: Compile check
        run: |
          python -m compileall -q tv_guide.py tv_player.py

      # Import smoke would require a fixture config.json (today the module
      # reads config at import-time). Add it after the package refactor.
