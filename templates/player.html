<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pi TV Remote</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f0f">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg-card:#1a1a1a;--bg-card-hover:#222;
  --border:#333;--accent:#3b9eff;--accent-glow:rgba(59,158,255,.25);
  --text:#ececec;--text-dim:#999;--text-muted:#666;
  --red:#e53935;--amber:#e8b430;--green:#43a047;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
html{font-size:15px}
body{font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ====== PREVIEW WINDOW ====== */
.preview-section{
  background:linear-gradient(135deg,#111 0%,#1a1a1a 50%,#111 100%);
  border-bottom:1px solid var(--border);padding:16px 24px;
}
.preview-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;
}
.preview-label{display:flex;align-items:center;gap:10px}
.preview-ch{font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
.preview-title{font-size:18px;font-weight:800}
.preview-status{display:flex;align-items:center;gap:6px}
.preview-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.preview-dot.offline{background:var(--red);animation:none}
.preview-status-label{font-size:11px;color:var(--text-dim);font-weight:600}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.preview-right{display:flex;align-items:center;gap:10px}
.preview-clock{font-size:14px;font-weight:700;color:var(--amber);font-variant-numeric:tabular-nums;white-space:nowrap}

.preview-wrap{
  position:relative;width:100%;max-width:720px;margin:0 auto;
  border-radius:10px;overflow:hidden;border:2px solid var(--border);
  background:#000;aspect-ratio:16/9;
}
.preview-wrap video{width:100%;height:100%;object-fit:contain;display:block;background:#000}
.preview-overlay{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  background:rgba(0,0,0,.7);transition:opacity .3s;pointer-events:none;
}
.preview-overlay.hidden{opacity:0}
.preview-overlay-icon{width:48px;height:48px;color:var(--text-dim)}
.preview-overlay-text{font-size:13px;color:var(--text-dim);font-weight:600}
.preview-toggle{
  display:inline-flex;align-items:center;gap:6px;
  height:32px;padding:0 12px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg-card);color:var(--text);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;
}
.preview-toggle:hover{border-color:var(--accent);background:var(--bg-card-hover)}
.preview-toggle.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.preview-toggle svg{width:14px;height:14px;fill:currentColor}

/* ====== CONTROLS BAR ====== */
.controls{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 24px;border-bottom:1px solid var(--border);
  background:rgba(15,15,15,.6);flex-wrap:wrap;
}
.ctrl-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  height:40px;padding:0 16px;border-radius:10px;border:1px solid var(--border);
  background:var(--bg-card);color:var(--text);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;white-space:nowrap;text-decoration:none;
}
.ctrl-btn:hover{background:var(--bg-card-hover);border-color:var(--accent)}
.ctrl-btn:active{transform:scale(.96)}
.ctrl-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.ctrl-btn.warn{background:var(--amber);color:#000;border-color:var(--amber)}
.ctrl-btn svg{width:16px;height:16px;fill:currentColor}
.ctrl-group{display:flex;align-items:center;gap:4px}
.ctrl-group .ctrl-btn{border-radius:8px}
.vol-label{font-size:11px;color:var(--text-dim);font-weight:700;min-width:36px;text-align:center;font-variant-numeric:tabular-nums}
.ch-nav{display:flex;gap:4px}

/* ====== CHANNEL GRID ====== */
.grid-header{
  padding:16px 24px 8px;display:flex;align-items:center;justify-content:space-between;
}
.grid-title{font-size:14px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
.grid-count{font-size:12px;color:var(--text-muted)}
.channels{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
  gap:10px;padding:8px 24px 24px;
}
@media(min-width:900px){.channels{grid-template-columns:repeat(5,1fr)}}
@media(min-width:1200px){.channels{grid-template-columns:repeat(5,1fr);max-width:1000px;margin:0 auto}}

.ch-card{
  position:relative;border-radius:12px;overflow:hidden;cursor:pointer;
  border:2px solid var(--border);background:var(--bg-card);
  transition:all .2s;display:flex;flex-direction:column;align-items:center;
  padding:12px 8px 10px;gap:6px;
}
.ch-card:hover{border-color:var(--accent);background:var(--bg-card-hover);transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,.4)}
.ch-card:active{transform:translateY(0);transition:all .05s}
.ch-card.active{border-color:var(--accent);background:rgba(59,158,255,.08);
  box-shadow:0 0 0 1px var(--accent),0 4px 20px var(--accent-glow)}
.ch-card.active::after{
  content:"ON AIR";position:absolute;top:6px;right:6px;
  font-size:8px;font-weight:800;letter-spacing:.5px;
  background:var(--red);color:#fff;padding:2px 6px;border-radius:4px;
}
.ch-logo{width:64px;height:64px;border-radius:10px;object-fit:cover;background:var(--bg);flex-shrink:0}
.ch-num{font-size:24px;font-weight:800;color:var(--accent);line-height:1}
.ch-name{font-size:11px;font-weight:600;color:var(--text-dim);text-align:center;
  line-height:1.2;max-height:2.4em;overflow:hidden;word-break:break-word}

/* ====== FOOTER ====== */
.footer{
  text-align:center;padding:16px;font-size:11px;color:var(--text-muted);
  border-top:1px solid var(--border);margin-top:8px;
}
.footer kbd{
  display:inline-block;padding:1px 5px;border-radius:3px;
  background:var(--bg-card);border:1px solid var(--border);
  font-family:inherit;font-size:10px;color:var(--text-dim);
}
</style>
</head>
<body>

<!-- Live Preview -->
<div class="preview-section">
  <div class="preview-header">
    <div class="preview-label">
      <img id="np-logo" src="/static/Media/1.png" alt=""
           style="width:40px;height:40px;border-radius:8px;object-fit:cover;border:1px solid var(--border)">
      <div>
        <div class="preview-ch" id="np-channel">CH 1</div>
        <div class="preview-title" id="np-title">Crime &amp; Justice</div>
      </div>
    </div>
    <div class="preview-right">
      <div class="preview-clock" id="player-clock"></div>
      <div class="preview-status">
        <div class="preview-dot" id="np-dot"></div>
        <div class="preview-status-label" id="np-label">Playing</div>
      </div>
      <button class="preview-toggle" id="btn-preview" onclick="togglePreview()">
        <svg viewBox="0 0 20 20"><path d="M10 3C5 3 1.7 7.3.5 10c1.2 2.7 4.5 7 9.5 7s8.3-4.3 9.5-7C18.3 7.3 15 3 10 3zm0 11.5a4.5 4.5 0 110-9 4.5 4.5 0 010 9z"/><circle cx="10" cy="10" r="2.5"/></svg>
        <span id="lbl-preview">Preview</span>
      </button>
    </div>
  </div>
  <div class="preview-wrap" id="preview-wrap" style="display:none">
    <video id="preview-video" muted playsinline></video>
    <div class="preview-overlay" id="preview-overlay">
      <svg class="preview-overlay-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M10 8l6 4-6 4V8z" fill="currentColor" stroke="none"/></svg>
      <div class="preview-overlay-text" id="preview-overlay-text">Click Preview to watch</div>
    </div>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <div class="ch-nav">
    <button class="ctrl-btn" onclick="api('channel/down')" title="Channel Down">
      <svg viewBox="0 0 20 20"><path d="M5 8l5 5 5-5z"/></svg> CH-
    </button>
    <button class="ctrl-btn" onclick="api('channel/up')" title="Channel Up">
      <svg viewBox="0 0 20 20"><path d="M5 12l5-5 5 5z"/></svg> CH+
    </button>
  </div>

  <button class="ctrl-btn" id="btn-pause" onclick="api('pause')">
    <svg viewBox="0 0 20 20" id="ico-pause"><path d="M6 4h3v12H6zm5 0h3v12h-3z"/></svg>
    <span id="lbl-pause">Pause</span>
  </button>

  <button class="ctrl-btn" id="btn-mute" onclick="api('mute')">
    <svg viewBox="0 0 20 20" id="ico-mute"><path d="M10 3L5 7H2v6h3l5 4V3z"/><path d="M14.5 5.5a7 7 0 010 9M17 3a10 10 0 010 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <span id="lbl-mute">Mute</span>
  </button>

  <div class="ctrl-group">
    <button class="ctrl-btn" onclick="api('volume/down')" title="Vol -">
      <svg viewBox="0 0 20 20"><path d="M4 8h12v4H4z"/></svg>
    </button>
    <span class="vol-label" id="vol-label">100%</span>
    <button class="ctrl-btn" onclick="api('volume/up')" title="Vol +">
      <svg viewBox="0 0 20 20"><path d="M9 4v12M4 9h12v2H4z"/></svg>
    </button>
  </div>

  <button class="ctrl-btn" onclick="api('refresh')" title="Refresh Stream">
    <svg viewBox="0 0 20 20"><path d="M10 3a7 7 0 105.2 2.3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M15.2 1v4.3h-4.3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <a class="ctrl-btn" id="guide-link" title="Open TV Guide">
    <svg viewBox="0 0 20 20"><path d="M3 4h14a1 1 0 011 1v10a1 1 0 01-1 1H3a1 1 0 01-1-1V5a1 1 0 011-1zm0 3h14M7 7v9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Guide
  </a>
</div>

<!-- Channel Grid -->
<div class="grid-header">
  <span class="grid-title">Channels</span>
  <span class="grid-count" id="grid-count"></span>
</div>
<div class="channels" id="channel-grid"></div>

<div class="footer">
  Pi TV Player &middot;
  <kbd>0-9</kbd> direct tune &middot;
  <kbd>&uarr;&darr;</kbd> ch+/ch- &middot;
  <kbd>Space</kbd> pause &middot;
  <kbd>M</kbd> mute &middot;
  <kbd>Q</kbd> quit
</div>

<!-- mpegts.js for MPEG-TS playback in browser -->
<script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.js"></script>
<script>
const CHANNELS = [];
let currentChannel = 1;
let previewActive = false;
let player = null;

// Guide link: use current hostname so it works from any device
document.getElementById('guide-link').href = 'http://' + location.hostname + ':5001';

// ====== Clock ======
function updateClock() {
  const d = new Date();
  const h = d.getHours() % 12 || 12;
  const m = String(d.getMinutes()).padStart(2, '0');
  const ap = d.getHours() >= 12 ? 'PM' : 'AM';
  document.getElementById('player-clock').textContent = h + ':' + m + ' ' + ap;
}
setInterval(updateClock, 1000);
updateClock();

function api(endpoint) {
  fetch('/api/' + endpoint, {method: 'POST'})
    .then(r => r.json())
    .then(d => {
      const chChanged = d.channel !== currentChannel;
      update(d);
      if (chChanged && previewActive) startPreview(d.channel);
    })
    .catch(() => setOffline());
}

function update(d) {
  currentChannel = d.channel;
  document.getElementById('np-channel').textContent = 'CH ' + d.channel;
  document.getElementById('np-title').textContent = d.channel_name;
  document.getElementById('np-logo').src = '/static/Media/' + d.channel + '.png';

  const dot = document.getElementById('np-dot');
  const lbl = document.getElementById('np-label');
  if (!d.mpv_running) {
    dot.className = 'preview-dot offline';
    lbl.textContent = 'Offline';
  } else if (d.paused) {
    dot.className = 'preview-dot offline';
    lbl.textContent = 'Paused';
  } else {
    dot.className = 'preview-dot';
    lbl.textContent = 'Playing';
  }

  const pauseBtn = document.getElementById('btn-pause');
  document.getElementById('lbl-pause').textContent = d.paused ? 'Play' : 'Pause';
  pauseBtn.classList.toggle('warn', d.paused);

  const muteBtn = document.getElementById('btn-mute');
  document.getElementById('lbl-mute').textContent = d.muted ? 'Unmute' : 'Mute';
  muteBtn.classList.toggle('active', d.muted);

  document.getElementById('vol-label').textContent = d.volume + '%';

  document.querySelectorAll('.ch-card').forEach(card => {
    card.classList.toggle('active', parseInt(card.dataset.num) === d.channel);
  });
}

function setOffline() {
  document.getElementById('np-dot').className = 'preview-dot offline';
  document.getElementById('np-label').textContent = 'Disconnected';
}

// ====== Live Preview ======

function togglePreview() {
  const btn = document.getElementById('btn-preview');
  const wrap = document.getElementById('preview-wrap');
  if (previewActive) {
    stopPreview();
    wrap.style.display = 'none';
    btn.classList.remove('active');
    document.getElementById('lbl-preview').textContent = 'Preview';
    previewActive = false;
  } else {
    wrap.style.display = 'block';
    btn.classList.add('active');
    document.getElementById('lbl-preview').textContent = 'Hide';
    previewActive = true;
    startPreview(currentChannel);
  }
}

function startPreview(ch) {
  stopPreview();
  const video = document.getElementById('preview-video');
  const overlay = document.getElementById('preview-overlay');
  const overlayText = document.getElementById('preview-overlay-text');

  overlay.classList.remove('hidden');
  overlayText.textContent = 'Loading stream...';

  if (typeof mpegts !== 'undefined' && mpegts.isSupported()) {
    player = mpegts.createPlayer({
      type: 'mpegts',
      url: '/stream/' + ch + '.ts',
      isLive: true,
    }, {
      enableWorker: false,
      enableStashBuffer: false,
      stashInitialSize: 128 * 1024,
      liveBufferLatencyChasing: true,
      liveBufferLatencyChasingSpeed: 1.5,
      autoCleanupSourceBuffer: true,
      autoCleanupMaxBackwardDuration: 30,
      autoCleanupMinBackwardDuration: 15,
      fixAudioTimestampGap: true,
    });
    player.attachMediaElement(video);
    player.load();

    // Try to play — handle autoplay restrictions
    var playAttempt = video.play();
    if (playAttempt !== undefined) {
      playAttempt.then(() => {
        overlay.classList.add('hidden');
      }).catch(() => {
        overlayText.textContent = 'Tap to play';
        overlay.style.pointerEvents = 'auto';
        overlay.style.cursor = 'pointer';
        overlay.onclick = function() {
          video.play().then(() => overlay.classList.add('hidden'));
          overlay.style.pointerEvents = 'none';
          overlay.onclick = null;
        };
      });
    }

    player.on(mpegts.Events.ERROR, function(errType, errDetail, errInfo) {
      console.error('mpegts error:', errType, errDetail, errInfo);
      overlayText.textContent = 'Stream error — try refresh';
      overlay.classList.remove('hidden');
    });
    player.on(mpegts.Events.LOADING_COMPLETE, function() {
      // Stream ended (shouldn't happen for live), try reconnect
      console.log('Stream ended, reconnecting...');
      setTimeout(function() { if (previewActive) startPreview(ch); }, 2000);
    });
    video.addEventListener('playing', function onPlay() {
      overlay.classList.add('hidden');
      video.removeEventListener('playing', onPlay);
    });
  } else {
    // Fallback: direct URL (works in some browsers like Safari with native TS support)
    overlayText.textContent = 'Trying direct stream...';
    video.src = '/stream/' + ch + '.ts';
    video.play().then(() => overlay.classList.add('hidden')).catch(() => {
      overlayText.textContent = 'Browser does not support MPEG-TS playback';
    });
  }
}

function stopPreview() {
  if (player) {
    player.pause();
    player.unload();
    player.detachMediaElement();
    player.destroy();
    player = null;
  }
  const video = document.getElementById('preview-video');
  video.removeAttribute('src');
  video.load();
}

// ====== Channel Grid ======

function buildGrid(channels) {
  const grid = document.getElementById('channel-grid');
  grid.innerHTML = '';
  document.getElementById('grid-count').textContent = channels.length + ' channels';
  channels.forEach(ch => {
    const card = document.createElement('div');
    card.className = 'ch-card' + (ch.number === currentChannel ? ' active' : '');
    card.dataset.num = ch.number;
    card.onclick = () => api('channel/' + ch.number);
    card.innerHTML =
      '<img class="ch-logo" src="/static/Media/' + ch.number + '.png" alt="" loading="lazy">' +
      '<div class="ch-num">' + ch.number + '</div>' +
      '<div class="ch-name">' + ch.name + '</div>';
    grid.appendChild(card);
  });
}

// ====== Init ======

fetch('/api/channels').then(r => r.json()).then(channels => {
  CHANNELS.push(...channels);
  buildGrid(channels);
  fetch('/api/status').then(r => r.json()).then(update).catch(() => setOffline());
});

// Poll status every 5s
setInterval(() => {
  fetch('/api/status').then(r => r.json()).then(update).catch(() => setOffline());
}, 5000);
</script>
</body>
</html>
