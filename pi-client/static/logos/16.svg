    <path d="M95,60 Q100,40 95,22" fill="none" stroke="#ffe0a0" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <path d="M118,65 Q123,45 118,30" fill="none" stroke="#ffe0a0" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
