<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="24" fill="#1e1e1e"/>
  <!-- Eye symbol -->
  <g fill="#e53935">
    <!-- Eye outline -->
    <path d="M30,100 Q100,40 170,100 Q100,160 30,100 Z" fill="none" stroke="#e53935" stroke-width="9" stroke-linejoin="round"/>
    <!-- Iris -->
    <circle cx="100" cy="100" r="24" fill="#e53935"/>
    <!-- Pupil -->
    <circle cx="100" cy="100" r="12" fill="#1e1e1e"/>
    <!-- Highlight -->
    <circle cx="108" cy="92" r="5" fill="#ff8a80"/>
  </g>
</svg>